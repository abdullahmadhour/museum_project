<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المتحف المصري الكبير - حجز التذاكر</title>
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f1ea; margin: 0; }
        header { background: var(--dark); color: var(--gold); padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .booking-section { background: white; max-width: 500px; margin: 30px auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--dark); color: var(--gold); font-weight: bold; cursor: pointer; border: none; font-size: 1.1rem; }
        #totalPriceDisplay { background: #fffde7; padding: 10px; border-radius: 8px; text-align: center; display: none; border: 1px dashed var(--gold); }
    </style>
</head>
<body>
    <header><h1>🏛️ المتحف المصري الكبير</h1></header>
    <div class="booking-section">
        <h2>🎫 حجز تذكرة زيارة</h2>
        <form action="/book" method="post">
            <input type="text" name="name" placeholder="الاسم الكامل" required>
            <input type="date" name="date" required>
            <select name="ticket_type" id="ticketType" onchange="calculatePrice()" required>
                <option value="">اختر نوع التذكرة</option>
                <option value="egyptian">زائر مصري (60 ج.م)</option>
                <option value="foreign">زائر أجنبي (200 ج.م)</option>
                <option value="student">طالب (30 ج.م)</option>
            </select>
            <input type="number" name="count" id="ticketCount" placeholder="العدد" min="1" oninput="calculatePrice()" required>
            <select name="payment_method" required>
                <option value="عند الوصول">دفع كاش عند الوصول</option>
                <option value="محفظة إلكترونية">فودافون كاش</option>
                <option value="حساب بنكي">بطاقة بنكية</option>
            </select>
            <div id="totalPriceDisplay"></div>
            <button type="submit">تأكيد الحجز</button>
        </form>
    </div>
    <script>
        function calculatePrice() {
            const type = document.getElementById('ticketType').value;
            const count = document.getElementById('ticketCount').value;
            const display = document.getElementById('totalPriceDisplay');
            const prices = { egyptian: 60, foreign: 200, student: 30 };
            if (type && count > 0) {
                display.style.display = 'block';
                display.innerHTML = `المبلغ: ${prices[type] * count} ج.م`;
            } else display.style.display = 'none';
        }
    </script>
</body>
</html>
